<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema Integral de Asistencia</title>
    <!-- Mismos estilos de la APP principal -->
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/all.min.css" rel="stylesheet">
    <!-- Auth Service (Sin el Interceptor global para que no intente pedir Token en el login mismo) -->
    <!-- Cargamos Auth, pero evitaremos inicializar el interceptor en esta página o lo ignorará por url -->
    <script src="/static/js/auth.js?v={{ startup_id }}"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #18bc9c;
            --accent-color: #3498db;
        }

        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1a252f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 30px 20px;
            border-bottom: 4px solid var(--secondary-color);
        }

        .card-header i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--secondary-color);
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .card-body {
            padding: 40px 30px;
        }

        .input-group-text {
            background-color: transparent;
            border-right: none;
            color: var(--primary-color);
        }

        .form-control {
            border-left: none;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(24, 188, 156, 0.25);
            border-radius: 0.375rem;
        }

        .btn-login {
            background-color: var(--secondary-color);
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-login:hover {
            background-color: #128f76;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(24, 188, 156, 0.4);
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
            min-height: 20px;
            font-weight: 500;
        }

        .loading-spinner {
            display: none;
            margin-left: 10px;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #7f8c8d;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="card-header">
            <i class="fa-solid fa-fingerprint"></i>
            <h2>Acceso al Sistema</h2>
            <div style="font-size: 0.9rem; opacity: 0.8; margin-top: 5px;">Plataforma de Asistencia Integrada</div>
        </div>
        <div class="card-body">
            <form id="loginForm">
                <div class="mb-4">
                    <label for="username" class="form-label text-muted fw-bold small text-uppercase">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="Ingrese su usuario" required
                            autocomplete="username">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-muted fw-bold small text-uppercase">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña"
                            required autocomplete="current-password">
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
                        <span class="btn-text">INICIAR SESIÓN</span>
                        <span class="spinner-border spinner-border-sm loading-spinner" role="status"
                            aria-hidden="true"></span>
                    </button>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <div class="footer-text">
                    <p class="mb-0">&copy; 2026 Portal Administrativo | Sistema de Gestión de Asistencia</p>
                </div>
            </form>
        </div>
    </div>

    <!-- Script de Login -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar si ya está logueado
            if (AuthService.getToken()) {
                window.location.href = '/index.html';
            }

            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = loginBtn.querySelector('.btn-text');
            const spinner = loginBtn.querySelector('.loading-spinner');
            const errorMessage = document.getElementById('errorMessage');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                if (!username || !password) {
                    errorMessage.textContent = 'Por favor, complete ambos campos.';
                    return;
                }

                // Loading state
                loginBtn.disabled = true;
                btnText.textContent = 'VERIFICANDO...';
                spinner.style.display = 'inline-block';
                errorMessage.textContent = '';

                try {
                    await AuthService.login(username, password);
                    // Login exitoso, obtener pre-carga de permisos (para UI condicional)
                    try {
                        const permRes = await fetch('/api/auth/permissions/', {
                            headers: { 'Authorization': `Bearer ${AuthService.getToken()}` }
                        });
                        if (permRes.ok) {
                            const pData = await permRes.json();
                            localStorage.setItem('user_permissions', JSON.stringify(pData.permisos));
                        }
                    } catch (e) { console.warn("No se cargaron permisos previos", e); }

                    window.location.href = '/index.html';
                } catch (error) {
                    // Restaurar estado
                    loginBtn.disabled = false;
                    btnText.textContent = 'INICIAR SESIÓN';
                    spinner.style.display = 'none';

                    // Mostrar error
                    errorMessage.textContent = error.message || 'Error de conexión. Intente nuevamente.';
                }
            });
        });
    </script>
</body>

</html>
