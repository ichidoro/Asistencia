<!DOCTYPE html>
<html lang="es" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="only light">
    <title>Login | Sistema Integral de Asistencia</title>
    <!-- Mismos estilos de la APP principal -->
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/all.min.css" rel="stylesheet">
    <!-- Auth Service (Sin el Interceptor global para que no intente pedir Token en el login mismo) -->
    <!-- Cargamos Auth, pero evitaremos inicializar el interceptor en esta página o lo ignorará por url -->
    <script src="/static/js/auth.js?v={{ startup_id }}"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #18bc9c;
            --accent-color: #3498db;
        }

        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1a252f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 30px 20px;
            border-bottom: 4px solid var(--secondary-color);
        }

        .card-header i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--secondary-color);
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .card-body {
            padding: 40px 30px;
        }

        .input-group-text {
            background-color: transparent;
            border-right: none;
            color: var(--primary-color);
        }

        .form-control {
            border-left: none;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(24, 188, 156, 0.25);
            border-radius: 0.375rem;
        }

        .btn-login {
            background-color: var(--secondary-color);
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-login:hover {
            background-color: #128f76;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(24, 188, 156, 0.4);
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
            min-height: 20px;
            font-weight: 500;
        }

        .loading-spinner {
            display: none;
            margin-left: 10px;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #7f8c8d;
        }
    </style>
    <!-- Mobile Responsive Overrides -->
    <link rel="stylesheet" href="/static/css/responsive.css">
</head>

<body>

    <div class="login-card">
        <div class="card-header">
            <i class="fa-solid fa-fingerprint"></i>
            <h2>Acceso al Sistema</h2>
            <div style="font-size: 0.9rem; opacity: 0.8; margin-top: 5px;">Plataforma de Asistencia Integrada</div>
        </div>
        <div class="card-body">
            <form id="loginForm">
                <div class="mb-4">
                    <label for="username" class="form-label text-muted fw-bold small text-uppercase">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="Ingrese su usuario" required
                            autocomplete="username">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-muted fw-bold small text-uppercase">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña"
                            required autocomplete="current-password">
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
                        <span class="btn-text">INICIAR SESIÓN</span>
                        <span class="spinner-border spinner-border-sm loading-spinner" role="status"
                            aria-hidden="true"></span>
                    </button>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <div class="footer-text">
                    <p class="mb-0">&copy; 2026 Portal Administrativo | Sistema de Gestión de Asistencia</p>
                </div>
            </form>
        </div>
    </div>

    <!-- Script de Login -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar si ya está logueado
            if (AuthService.getToken()) {
                window.location.href = '/index.html';
            }

            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = loginBtn.querySelector('.btn-text');
            const spinner = loginBtn.querySelector('.loading-spinner');
            const errorMessage = document.getElementById('errorMessage');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                if (!username || !password) {
                    errorMessage.textContent = 'Por favor, complete ambos campos.';
                    return;
                }

                // Loading state
                loginBtn.disabled = true;
                btnText.textContent = 'VERIFICANDO...';
                spinner.style.display = 'inline-block';
                errorMessage.textContent = '';

                try {
                    await AuthService.login(username, password);
                    // Login exitoso, obtener pre-carga de permisos (para UI condicional)
                    try {
                        const permRes = await fetch('/api/auth/permissions/', {
                            headers: { 'Authorization': `Bearer ${AuthService.getToken()}` }
                        });
                        if (permRes.ok) {
                            const pData = await permRes.json();
                            localStorage.setItem('user_permissions', JSON.stringify(pData.permisos));
                        }
                    } catch (e) { console.warn("No se cargaron permisos previos", e); }
                    // 🥚 Easter Egg — Solo para ncarrasco (slideshow)
                    if (username.toLowerCase() === 'ncarrasco') {
                        const totalSlides = 4;
                        let currentSlide = 1;
                        const overlay = document.createElement('div');
                        overlay.id = 'easter-egg-overlay';
                        overlay.innerHTML = `
                            <style>
                                #easter-egg-overlay {
                                    position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.88);
                                    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
                                    animation:eeIn .5s ease-out;cursor:pointer;
                                }
                                @keyframes eeIn{from{opacity:0}to{opacity:1}}
                                @keyframes eeImg{0%{transform:scale(.3) rotate(-10deg);opacity:0}60%{transform:scale(1.03) rotate(1deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
                                @keyframes eeGlow{0%{box-shadow:0 0 20px rgba(255,215,0,.3)}50%{box-shadow:0 0 50px rgba(255,215,0,.6),0 0 80px rgba(255,165,0,.2)}100%{box-shadow:0 0 20px rgba(255,215,0,.3)}}
                                @keyframes eeTxt{from{transform:translateY(15px);opacity:0}to{transform:translateY(0);opacity:1}}
                                #easter-egg-overlay .ee-img{max-width:85vw;max-height:65vh;border-radius:16px;animation:eeImg .7s cubic-bezier(.34,1.56,.64,1),eeGlow 2.5s ease-in-out infinite;transition:opacity .3s}
                                #easter-egg-overlay .ee-n{font-size:1.4rem;font-weight:600;background:linear-gradient(135deg,#FFD700,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:eeTxt .5s ease-out .6s both;opacity:0}
                                #easter-egg-overlay .ee-t{color:#fff;font-size:1rem;font-weight:300;text-align:center;letter-spacing:.5px;animation:eeTxt .5s ease-out .4s both;opacity:0}
                                #easter-egg-overlay .ee-dots{display:flex;gap:8px;animation:eeTxt .4s ease-out 1s both;opacity:0}
                                #easter-egg-overlay .ee-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .3s}
                                #easter-egg-overlay .ee-dot.active{background:#FFD700;transform:scale(1.3)}
                                #easter-egg-overlay .ee-h{font-size:.7rem;color:rgba(255,255,255,.35);animation:eeTxt .4s ease-out 1.2s both;opacity:0}
                            </style>
                            <img class="ee-img" src="/huevo_1.jpg" alt="🥚">
                            <div class="ee-n">¡Encontraste el Huevo de Pascua! 🥚✨</div>
                            <div class="ee-t">Un secreto escondido solo para ti</div>
                            <div class="ee-dots">
                                <span class="ee-dot active"></span>
                                <span class="ee-dot"></span>
                                <span class="ee-dot"></span>
                                <span class="ee-dot"></span>
                            </div>
                            <div class="ee-h">Toca para ver la siguiente ▸</div>
                        `;
                        document.body.appendChild(overlay);

                        // 🎵 Música de fondo
                        const audio = new Audio('/cancion.mp3');
                        audio.loop = true;
                        audio.volume = 1.0;
                        audio.play().catch(() => {});

                        const img = overlay.querySelector('.ee-img');
                        const dots = overlay.querySelectorAll('.ee-dot');
                        const hint = overlay.querySelector('.ee-h');
                        overlay.addEventListener('click', () => {
                            if (currentSlide < totalSlides) {
                                currentSlide++;
                                img.style.opacity = '0';
                                img.style.transform = 'scale(0.95)';
                                setTimeout(() => {
                                    img.src = `/huevo_${currentSlide}.jpg`;
                                    img.style.opacity = '1';
                                    img.style.transform = 'scale(1)';
                                }, 300);
                                dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide - 1));
                                if (currentSlide === totalSlides) {
                                    hint.textContent = 'Toca para continuar ✓';
                                }
                            } else {
                                // Fade out audio
                                const fadeAudio = setInterval(() => {
                                    if (audio.volume > 0.05) { audio.volume -= 0.05; }
                                    else { clearInterval(fadeAudio); audio.pause(); }
                                }, 50);
                                overlay.style.transition = 'opacity 0.4s';
                                overlay.style.opacity = '0';
                                setTimeout(() => { overlay.remove(); window.location.href = '/index.html'; }, 400);
                            }
                        });
                    } else {
                        window.location.href = '/index.html';
                    }
                } catch (error) {
                    // Restaurar estado
                    loginBtn.disabled = false;
                    btnText.textContent = 'INICIAR SESIÓN';
                    spinner.style.display = 'none';

                    // Mostrar error
                    errorMessage.textContent = error.message || 'Error de conexión. Intente nuevamente.';
                }
            });
        });
    </script>
</body>

</html>
